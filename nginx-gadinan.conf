# Nginx 反向代理配置（复制到 /etc/nginx/sites-available/gadinan）
# 域名请替换为 gardinan.xyz
# 启用: ln -sf /etc/nginx/sites-available/gadinan /etc/nginx/sites-enabled/
# 测试: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name gardinan.xyz www.gardinan.xyz;

    client_max_body_size 20M;

    # 语音识别 + DeepSeek 较慢，需加长超时（默认 60s 会 504 返回 HTML）
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
